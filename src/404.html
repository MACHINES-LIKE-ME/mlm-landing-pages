<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'none'; form-action 'none'; object-src 'none'; upgrade-insecure-requests"
    />
    <meta name="referrer" content="no-referrer" />
    <meta name="description" content="Page not found in the MLM Landing Pages repository." />
    <meta name="theme-color" content="#111827" />
    <title>Page Not Found | MLM Landing Pages</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/assets/styles/site.css" />
  </head>
  <body data-page="not-found">
    <main class="shell error-page" id="content">
      <p class="eyebrow">404</p>
      <h1>That page is not published here.</h1>
      <p>
        The landing page may have moved, or the URL may be incomplete. Return to the public index to
        find every available page in this repository.
      </p>
      <a class="button button-primary" href="./">Back to landing page index</a>
    </main>
  </body>
</html>
